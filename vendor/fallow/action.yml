name: 'Fallow - Codebase Intelligence'
description: 'Finds unused code, duplication, circular deps, complexity hotspots, and architecture drift in TypeScript and JavaScript.'
author: 'Bart Waardenburg'

branding:
  icon: 'search'
  color: 'orange'

inputs:
  command:
    description: 'Command to run: dead-code (unused code), dupes (code duplication), health (complexity), audit (changed-file quality gate), fix (auto-remove unused code). Default runs all analyses. Legacy alias: check = dead-code.'
    required: false
    default: ''
  root:
    description: 'Project root directory'
    required: false
    default: '.'
  config:
    description: 'Path to config file (.fallowrc.json, .fallowrc.jsonc, fallow.toml, or .fallow.toml)'
    required: false
  format:
    description: 'Output format (human, json, sarif, compact, markdown, codeclimate, pr-comment-github, pr-comment-gitlab, review-github, review-gitlab, badge)'
    required: false
    default: 'sarif'
  sarif:
    description: 'Upload SARIF to GitHub Code Scanning. Requires Code Scanning availability (public repo or a plan with GitHub Advanced Security).'
    required: false
    default: 'false'
  production:
    description: 'Production mode: exclude test/dev files, only analyze start/build scripts'
    required: false
    default: 'false'
  production-dead-code:
    description: 'Combined mode only: run dead-code analysis in production mode'
    required: false
    default: 'false'
  production-health:
    description: 'Combined mode only: run health analysis in production mode'
    required: false
    default: 'false'
  production-dupes:
    description: 'Combined mode only: run duplication analysis in production mode'
    required: false
    default: 'false'
  fail-on-issues:
    description: 'Exit with code 1 if issues are found'
    required: false
    default: 'true'
  changed-since:
    description: 'Only report issues in files changed since this git ref (requires fetch-depth: 0)'
    required: false
  auto-changed-since:
    description: 'Automatically scope analysis to changed files in PR context using the base SHA (requires fetch-depth: 0). Ignored when changed-since is explicitly set.'
    required: false
    default: 'true'
  baseline:
    description: 'Path to baseline file for comparison'
    required: false
  save-baseline:
    description: 'Save current results as a baseline file'
    required: false
  version:
    description: 'Fallow version override. When omitted, the action uses the project package.json fallow dependency spec if present, otherwise latest. Pin a current fallow version so Ed25519 + SHA-256 binary verification can run.'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to fallow (space-separated)'
    required: false
    default: ''
  comment:
    description: 'Post results as a PR comment (requires pull-requests: write permission)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for PR comments and SARIF upload'
    required: false
    default: ${{ github.token }}
  annotations:
    description: 'Emit findings as inline PR annotations via workflow commands (no Advanced Security required)'
    required: false
    default: 'true'
  review-comments:
    description: 'Post findings as inline PR review comments with rich markdown formatting (code blocks, tables, links, suggestions). Creates a single review per run. Automatically disables plain-text annotations when enabled.'
    required: false
    default: 'false'
  max-annotations:
    description: 'Maximum number of inline annotations to emit (default: 50)'
    required: false
    default: '50'
  max-comments:
    description: 'Maximum number of inline review comments + items in the sticky details table (default: 50). Mirrors max-annotations for the typed pr-comment / review formats.'
    required: false
    default: '50'
  comment-id:
    description: 'Sticky-comment marker id, embedded in the HTML comment that identifies fallow''s comment for upsert. Defaults to ''fallow-results'', auto-suffixed with the workspace name when running scoped to a single workspace package.'
    required: false
    default: ''
  diff-filter:
    description: 'Diff-aware finding filter: ''added'' (default, only findings on PR-added lines), ''diff_context'' (added lines plus surrounding context), ''file'' (any file touched by the PR), ''nofilter'' (every finding).'
    required: false
    default: 'added'
  diff-file:
    description: 'Path to a unified-diff file. When set (directly OR derived by the analyze step from `gh pr diff` / `git diff --unified=0`), fallow narrows EVERY finding to lines inside an added hunk; project-level findings (unused deps, catalog entries, dependency overrides) bypass the filter. Also drives line-level scoping of the runtime-coverage `hot-path-touched` verdict. When both `diff-file` and `changed-since` are set, the diff filter wins for line-level filtering and `changed-since` still scopes file discovery; fallow logs a one-line stderr note. The analyze step propagates the resolved path via $GITHUB_ENV so the comment / review steps reuse the same file.'
    required: false
    default: ''
  api-retries:
    description: 'Maximum HTTP retry attempts for fallow ci reconcile-review and the bash gh-api wrappers. Defaults to 3.'
    required: false
    default: '3'
  api-retry-delay:
    description: 'Floor delay in seconds between rate-limited retries. Server-supplied Retry-After overrides this when present. Defaults to 2.'
    required: false
    default: '2'
  # Dupes-specific inputs
  dupes-mode:
    description: 'Detection mode for dupes command (strict, mild, weak, semantic)'
    required: false
    default: 'mild'
  min-tokens:
    description: 'Minimum token count for a clone (dupes command)'
    required: false
  min-lines:
    description: 'Minimum line count for a clone (dupes command)'
    required: false
  threshold:
    description: 'Fail if duplication exceeds this percentage (dupes command, 0 = no limit)'
    required: false
  skip-local:
    description: 'Only report cross-directory duplicates (dupes command)'
    required: false
    default: 'false'
  cross-language:
    description: 'Strip TypeScript type annotations for TS<->JS clone matching (dupes command)'
    required: false
    default: 'false'
  ignore-imports:
    description: 'Exclude import declarations from clone detection (dupes command)'
    required: false
    default: 'false'
  # Workspace
  workspace:
    description: "Scope output to one or more workspaces. Supports exact package names, globs matched against name and workspace path (apps/*, @scope/*), and !-prefixed negations. Comma-separated values ('web,admin') or a single pattern."
    required: false
  changed-workspaces:
    description: "Git-derived monorepo scoping: scope output to workspaces containing any file changed since REF (e.g., 'origin/main'). Auto-derives the workspace set from git diff so CI jobs don't maintain a hand-written list. Requires git history (fetch-depth: 0). Mutually exclusive with 'workspace'. A missing ref or non-git directory is a hard error (exit 2) rather than silent full-scope fallback."
    required: false
  # Health-specific inputs
  max-cyclomatic:
    description: 'Maximum cyclomatic complexity threshold (health command, default: 20)'
    required: false
  max-cognitive:
    description: 'Maximum cognitive complexity threshold (health command, default: 15)'
    required: false
  max-crap:
    description: 'Maximum CRAP score threshold (health and audit commands, default: 30.0). Functions meeting or exceeding this score are reported alongside complexity findings. Pair with coverage data for accurate per-function scoring.'
    required: false
  coverage:
    description: 'Path to Istanbul coverage-final.json data for accurate CRAP scoring (health and audit commands).'
    required: false
  runtime-coverage:
    description: 'Path to paid runtime coverage input for the health command: a V8 coverage directory, V8 JSON file, or Istanbul coverage-final.json'
    required: false
  coverage-root:
    description: 'Rebase Istanbul file paths before matching coverage or runtime coverage input (health and audit commands)'
    required: false
  min-invocations-hot:
    description: 'Hot-path threshold for runtime coverage findings (health command, default: 100)'
    required: false
  min-observation-volume:
    description: 'Minimum observation volume required for high-confidence runtime coverage verdicts (health command)'
    required: false
  low-traffic-threshold:
    description: 'Fraction of total trace volume below which an invoked function is classified as low_traffic instead of active (health command)'
    required: false
  top:
    description: 'Show only the N worst offenders (health and dupes commands)'
    required: false
  sort:
    description: 'Sort order for health results: cyclomatic (default), cognitive, lines, or severity (health command)'
    required: false
  file-scores:
    description: 'Compute per-file maintainability index (health command)'
    required: false
    default: 'false'
  hotspots:
    description: 'Identify files that are both complex and frequently changing (health command)'
    required: false
    default: 'false'
  targets:
    description: 'Show ranked refactoring recommendations (health command)'
    required: false
    default: 'false'
  complexity:
    description: 'Show only complexity findings section (health command)'
    required: false
    default: 'false'
  since:
    description: 'Git history window for hotspot analysis: durations (6m, 90d, 1y) or ISO dates (health command)'
    required: false
  min-commits:
    description: 'Minimum commits for a file to appear in hotspot ranking (health command, default: 3)'
    required: false
  score:
    description: 'Compute health score (0-100 with letter grade). Enables the health delta header in PR comments. Works with health and bare command (all analyses).'
    required: false
    default: 'false'
  min-severity:
    description: 'Only fail for findings at or above this severity (moderate, high, critical). Use "critical" to only fail on critical complexity findings.'
    required: false
  save-snapshot:
    description: 'Save vital signs snapshot to .fallow/snapshots/ for trend tracking. Use actions/cache to persist across runs. Provide a path or leave empty for default. Works with health and bare command.'
    required: false
  trend:
    description: 'Compare current metrics against the most recent saved snapshot and show per-metric deltas. Requires a previous snapshot from save-snapshot. Works with health and bare command.'
    required: false
  # Check-specific inputs
  issue-types:
    description: 'Comma-separated issue types to report (dead-code command). Valid: unused-files, unused-exports, unused-types, unused-deps, unused-enum-members, unused-class-members, unresolved-imports, unlisted-deps, duplicate-exports, circular-deps'
    required: false
  include-entry-exports:
    description: 'Report unused exports in entry files instead of auto-marking them as used. Catches framework export typos. Applied to dead-code analysis; also configurable persistently via includeEntryExports in your fallow config.'
    required: false
    default: 'false'
  # Audit-specific inputs
  gate:
    description: 'Audit verdict gate: new-only (default) fails only introduced findings, all fails on every finding in changed files.'
    required: false
  dead-code-baseline:
    description: 'Path to a dead-code baseline for the audit command.'
    required: false
  health-baseline:
    description: 'Path to a health baseline for the audit command.'
    required: false
  dupes-baseline:
    description: 'Path to a duplication baseline for the audit command.'
    required: false
  # Regression detection
  fail-on-regression:
    description: 'Exit with code 1 if issue counts regressed compared to baseline (dead-code command)'
    required: false
    default: 'false'
  tolerance:
    description: 'Allowed regression tolerance before failing (e.g. "2%" or "5") (dead-code command)'
    required: false
    default: '0'
  regression-baseline:
    description: 'Path to regression baseline file for comparison (dead-code command)'
    required: false
  save-regression-baseline:
    description: 'Save current results as a regression baseline file (dead-code command)'
    required: false
  # Fix-specific inputs
  dry-run:
    description: 'Preview changes without modifying files (fix command, default: true for CI safety)'
    required: false
    default: 'true'
  # Global flags
  no-cache:
    description: 'Disable incremental parse cache (force full re-parse of all files)'
    required: false
    default: 'false'
  threads:
    description: 'Number of parser threads (default: available CPU cores)'
    required: false
  # Bare invocation selectors
  only:
    description: 'Run only these analyses when no command is specified (comma-separated: dead-code,dupes,health)'
    required: false
  skip:
    description: 'Skip these analyses when no command is specified (comma-separated: dead-code,dupes,health)'
    required: false

outputs:
  results:
    description: 'Path to JSON results file'
    value: ${{ steps.analyze.outputs.results }}
  sarif:
    description: 'Path to SARIF results file'
    value: ${{ steps.analyze.outputs.sarif }}
  issues:
    description: 'Number of issues (dead-code), clone groups (dupes), introduced findings counted by the audit verdict (audit), or fixes proposed/applied (fix). Audit count is gate-aware: with `gate: new-only` (default) it sums attribution.*_introduced; with `gate: all` it sums summary.* totals. For audit, prefer `outputs.verdict` for severity-aware gating.'
    value: ${{ steps.analyze.outputs.issues }}
  verdict:
    description: 'Audit verdict (pass/warn/fail). Empty when command is not audit. The threshold step gates on this for audit so warn-tier findings do not fail CI.'
    value: ${{ steps.analyze.outputs.verdict }}
  gate:
    description: 'Audit gate that was applied (new-only/all). Empty when command is not audit.'
    value: ${{ steps.analyze.outputs.gate }}
  changed-files-unavailable:
    description: 'true when the analyze step could not enumerate PR-changed files (transient GitHub API failure, expired token, missing permissions); false on the happy path. Always emitted, regardless of whether changed-since was requested. Gate on this in downstream workflow steps to detect when analysis ran unscoped vs scoped.'
    value: ${{ steps.analyze.outputs.changed_files_unavailable }}
  post-skipped-reason:
    description: 'Reason the Post review comments step skipped posting (pagination_failure / none). Set to pagination_failure only when the inline-review POST was actually aborted to avoid duplicate threads (multi-comment dedup lookup failed). Empty when the Post review comments step did not run.'
    value: ${{ steps.review.outputs.post_skipped_reason }}
  dedup-lookup-failed:
    description: 'true when a dedup lookup failed on the Post PR comment or Post review comments step. Distinct from post-skipped-reason: the summary-only paths post a fresh comment anyway (potential duplicate) when their lookup fails, while the multi-comment review path aborts. Gate on this to detect either degraded state. Resolves to "true" if EITHER step reported a failure, "false" otherwise.'
    value: ${{ (steps.review.outputs.dedup_lookup_failed == 'true' || steps.comment.outputs.dedup_lookup_failed == 'true') && 'true' || 'false' }}

runs:
  using: 'composite'
  steps:
    - name: Install fallow
      shell: bash
      env:
        FALLOW_VERSION: ${{ inputs.version }}
        INPUT_ROOT: ${{ inputs.root }}
      run: bash ${{ github.action_path }}/action/scripts/install.sh

    - name: Cache analysis results
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ${{ inputs.root }}/.fallow
        key: fallow-cache-${{ runner.os }}-${{ hashFiles(format('{0}/**/package.json', inputs.root)) }}
        restore-keys: |
          fallow-cache-${{ runner.os }}-

    - name: Run analysis
      id: analyze
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ROOT: ${{ inputs.root }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_PRODUCTION: ${{ inputs.production }}
        INPUT_PRODUCTION_DEAD_CODE: ${{ inputs.production-dead-code }}
        INPUT_PRODUCTION_HEALTH: ${{ inputs.production-health }}
        INPUT_PRODUCTION_DUPES: ${{ inputs.production-dupes }}
        INPUT_CHANGED_SINCE: ${{ inputs.changed-since }}
        INPUT_AUTO_CHANGED_SINCE: ${{ inputs.auto-changed-since }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_NAME: ${{ github.event_name }}
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_SAVE_BASELINE: ${{ inputs.save-baseline }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_DUPES_MODE: ${{ inputs.dupes-mode }}
        INPUT_MIN_TOKENS: ${{ inputs.min-tokens }}
        INPUT_MIN_LINES: ${{ inputs.min-lines }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_SKIP_LOCAL: ${{ inputs.skip-local }}
        INPUT_CROSS_LANGUAGE: ${{ inputs.cross-language }}
        INPUT_IGNORE_IMPORTS: ${{ inputs.ignore-imports }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_CHANGED_WORKSPACES: ${{ inputs.changed-workspaces }}
        INPUT_MAX_CYCLOMATIC: ${{ inputs.max-cyclomatic }}
        INPUT_MAX_COGNITIVE: ${{ inputs.max-cognitive }}
        INPUT_MAX_CRAP: ${{ inputs.max-crap }}
        INPUT_COVERAGE: ${{ inputs.coverage }}
        INPUT_PRODUCTION_COVERAGE: ${{ inputs.runtime-coverage }}
        INPUT_COVERAGE_ROOT: ${{ inputs.coverage-root }}
        INPUT_MIN_INVOCATIONS_HOT: ${{ inputs.min-invocations-hot }}
        INPUT_MIN_OBSERVATION_VOLUME: ${{ inputs.min-observation-volume }}
        INPUT_LOW_TRAFFIC_THRESHOLD: ${{ inputs.low-traffic-threshold }}
        INPUT_TOP: ${{ inputs.top }}
        INPUT_SORT: ${{ inputs.sort }}
        INPUT_FILE_SCORES: ${{ inputs.file-scores }}
        INPUT_HOTSPOTS: ${{ inputs.hotspots }}
        INPUT_TARGETS: ${{ inputs.targets }}
        INPUT_COMPLEXITY: ${{ inputs.complexity }}
        INPUT_SINCE: ${{ inputs.since }}
        INPUT_MIN_COMMITS: ${{ inputs.min-commits }}
        INPUT_SCORE: ${{ inputs.score }}
        INPUT_MIN_SEVERITY: ${{ inputs.min-severity }}
        INPUT_SAVE_SNAPSHOT: ${{ inputs.save-snapshot }}
        INPUT_TREND: ${{ inputs.trend }}
        INPUT_ISSUE_TYPES: ${{ inputs.issue-types }}
        INPUT_INCLUDE_ENTRY_EXPORTS: ${{ inputs.include-entry-exports }}
        INPUT_GATE: ${{ inputs.gate }}
        INPUT_DEAD_CODE_BASELINE: ${{ inputs.dead-code-baseline }}
        INPUT_HEALTH_BASELINE: ${{ inputs.health-baseline }}
        INPUT_DUPES_BASELINE: ${{ inputs.dupes-baseline }}
        INPUT_FAIL_ON_REGRESSION: ${{ inputs.fail-on-regression }}
        INPUT_TOLERANCE: ${{ inputs.tolerance }}
        INPUT_REGRESSION_BASELINE: ${{ inputs.regression-baseline }}
        INPUT_SAVE_REGRESSION_BASELINE: ${{ inputs.save-regression-baseline }}
        INPUT_NO_CACHE: ${{ inputs.no-cache }}
        INPUT_THREADS: ${{ inputs.threads }}
        INPUT_ONLY: ${{ inputs.only }}
        INPUT_SKIP: ${{ inputs.skip }}
        # User-supplied diff overrides the analyze step's auto-generation
        # below; analyze.sh leaves it untouched when the user already
        # supplied a path. When the user did not, analyze.sh writes
        # fallow-pr.diff and exports it via $GITHUB_ENV so subsequent
        # steps (comment.sh, review.sh) skip their own `gh pr diff`
        # fetch and reuse the same file.
        FALLOW_DIFF_FILE: ${{ inputs.diff-file }}
      run: bash ${{ github.action_path }}/action/scripts/analyze.sh

    - name: Job summary
      if: always() && steps.analyze.outputs.issues != ''
      shell: bash
      env:
        FALLOW_COMMAND: ${{ steps.analyze.outputs.command }}
        ACTION_JQ_DIR: ${{ github.action_path }}/action/jq
        CHANGED_SINCE: ${{ steps.analyze.outputs.changed_since }}
        INPUT_ROOT: ${{ inputs.root }}
      run: bash ${{ github.action_path }}/action/scripts/summary.sh

    - name: Emit inline annotations
      if: >-
        always() &&
        inputs.annotations == 'true' &&
        inputs.review-comments != 'true' &&
        inputs.command != 'fix' &&
        steps.analyze.outputs.issues != '' &&
        steps.analyze.outputs.issues != '0'
      shell: bash
      env:
        FALLOW_COMMAND: ${{ steps.analyze.outputs.command }}
        MAX_ANNOTATIONS: ${{ inputs.max-annotations }}
        ACTION_JQ_DIR: ${{ github.action_path }}/action/jq
        CHANGED_SINCE: ${{ steps.analyze.outputs.changed_since }}
        INPUT_ROOT: ${{ inputs.root }}
      run: bash ${{ github.action_path }}/action/scripts/annotate.sh

    - name: Check Code Scanning availability
      id: ghas-check
      if: >-
        inputs.command != 'fix' &&
        inputs.sarif == 'true' &&
        steps.analyze.outputs.sarif != '' &&
        always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
      run: |
        if gh api "repos/${GH_REPO}/code-scanning/alerts?per_page=1" > /dev/null 2>&1; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::SARIF upload skipped. Code Scanning (GitHub Advanced Security) is not enabled on this repository. To enable: Settings > Code security > Code scanning. The job summary and JSON output are still available. To suppress this warning, use format: json instead of sarif."
        fi

    - name: Upload SARIF
      if: >-
        inputs.command != 'fix' &&
        inputs.sarif == 'true' &&
        steps.analyze.outputs.sarif != '' &&
        steps.ghas-check.outputs.available == 'true' &&
        always()
      uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
      with:
        sarif_file: fallow-results.sarif
        category: fallow
        token: ${{ inputs.github-token }}

    - name: Post PR comment
      id: comment
      if: >-
        inputs.comment == 'true' &&
        github.event_name == 'pull_request' &&
        always() &&
        steps.analyze.outputs.issues != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GH_REPO: ${{ github.repository }}
        FALLOW_COMMAND: ${{ steps.analyze.outputs.command }}
        CHANGED_SINCE: ${{ steps.analyze.outputs.changed_since }}
        INPUT_ROOT: ${{ inputs.root }}
        FALLOW_COMMENT_ID: ${{ inputs.comment-id }}
        FALLOW_DIFF_FILTER: ${{ inputs.diff-filter }}
        # FALLOW_DIFF_FILE is propagated from the analyze step via
        # $GITHUB_ENV. Declaring it here would override the propagation
        # whenever inputs.diff-file is empty (the default), forcing
        # comment.sh to re-fetch the diff via `gh pr diff` and
        # double-paying the API quota.
        FALLOW_API_RETRIES: ${{ inputs.api-retries }}
        FALLOW_API_RETRY_DELAY: ${{ inputs.api-retry-delay }}
      run: bash ${{ github.action_path }}/action/scripts/comment.sh

    - name: Post review comments
      id: review
      if: >-
        inputs.review-comments == 'true' &&
        github.event_name == 'pull_request' &&
        inputs.command != 'fix' &&
        always() &&
        steps.analyze.outputs.issues != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GH_REPO: ${{ github.repository }}
        FALLOW_COMMAND: ${{ steps.analyze.outputs.command }}
        FALLOW_ROOT: ${{ inputs.root }}
        MAX_COMMENTS: ${{ inputs.max-comments || inputs.max-annotations }}
        CHANGED_SINCE: ${{ steps.analyze.outputs.changed_since }}
        FALLOW_COMMENT_ID: ${{ inputs.comment-id }}
        FALLOW_DIFF_FILTER: ${{ inputs.diff-filter }}
        # FALLOW_DIFF_FILE is propagated from the analyze step via
        # $GITHUB_ENV (see comment on the comment step env block).
        FALLOW_API_RETRIES: ${{ inputs.api-retries }}
        FALLOW_API_RETRY_DELAY: ${{ inputs.api-retry-delay }}
      run: bash ${{ github.action_path }}/action/scripts/review.sh

    - name: Check threshold
      if: always() && steps.analyze.outputs.issues != ''
      shell: bash
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_FAIL_ON_ISSUES: ${{ inputs.fail-on-issues }}
        INPUT_GATE: ${{ inputs.gate }}
        ISSUES: ${{ steps.analyze.outputs.issues }}
        VERDICT: ${{ steps.analyze.outputs.verdict }}
      run: |
        if [ "$INPUT_FAIL_ON_ISSUES" != "true" ]; then exit 0; fi
        if [ "$INPUT_COMMAND" = "audit" ]; then
          # Audit gates on rule severity. Verdict already encodes the gate
          # decision: pass -> no issues, warn -> warn-tier only (do not fail),
          # fail -> error-tier (fail). Counting introduced findings instead
          # would re-introduce the bug issue #302 was filed to fix.
          if [ "$VERDICT" = "fail" ]; then
            echo "::error::Fallow audit failed (gate: ${INPUT_GATE:-new-only}, ${ISSUES} finding(s) at error severity in changed files)"
            exit 1
          fi
          exit 0
        fi
        if [ "$ISSUES" -gt 0 ]; then
          case "$INPUT_COMMAND" in
            dead-code|check) echo "::error::Fallow found ${ISSUES} unused code issues" ;;
            dupes)           echo "::error::Fallow found ${ISSUES} clone groups" ;;
            health)          echo "::error::Fallow found ${ISSUES} health findings" ;;
            fix)             echo "::error::Fallow found ${ISSUES} fixable issues" ;;
            "")              echo "::error::Fallow found ${ISSUES} issues" ;;
          esac
          exit 1
        fi
