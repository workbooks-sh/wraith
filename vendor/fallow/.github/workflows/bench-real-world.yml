name: Real-World Benchmarks

on:
  schedule:
    # Run daily at 07:00 UTC (after conformance at 06:00)
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: bench-real-world-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Real-world performance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: bench-real-world

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4
        with:
          version: 9

      - name: Build fallow
        run: cargo build --release -p fallow-cli

      - name: Run real-world benchmarks
        id: bench
        run: |
          ./benchmarks/bench-ci.sh \
            --fallow-bin ./target/release/fallow \
            --clone-dir /tmp/fallow-bench-ci \
            --runs 3 \
            > bench-real-world.json \
            2>bench-real-world-stderr.txt
        continue-on-error: true

      - name: Store benchmark result
        if: always() && steps.bench.outcome != 'skipped'
        uses: ./.github/actions/store-benchmark
        with:
          name: Fallow Real-World Benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench-real-world.json
          data-dir: bench-real-world
          alert-threshold: '200%'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          continue-on-error: 'true'

      - name: Post step summary
        if: always()
        run: |
          if [[ ! -f bench-real-world.json ]] || ! python3 -c "import json; json.load(open('bench-real-world.json'))" 2>/dev/null; then
            {
              echo "## Real-World Benchmarks"
              echo ""
              echo "Benchmark suite did not produce a valid report. Check the logs."
            } >> "$GITHUB_STEP_SUMMARY"
            if [[ -f bench-real-world-stderr.txt ]]; then
              {
                echo ""
                echo '```'
                tail -30 bench-real-world-stderr.txt
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          {
            echo "## Real-World Benchmarks"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          with open('bench-real-world.json') as f:
              data = json.load(f)
          projects = {}
          for entry in data:
              name = entry['name']
              if name.endswith(' (cold)'):
                  proj = name.removesuffix(' (cold)')
                  projects.setdefault(proj, {})['cold'] = entry['value']
              elif name.endswith(' (warm)'):
                  proj = name.removesuffix(' (warm)')
                  projects.setdefault(proj, {})['warm'] = entry['value']
          print('| Project | Cold | Warm | Cache speedup |')
          print('|---------|------|------|---------------|')
          for proj in sorted(projects.keys()):
              d = projects[proj]
              cold = d.get('cold', 0)
              warm = d.get('warm', 0)
              cold_str = f'{cold}ms' if cold < 1000 else f'{cold/1000:.2f}s'
              warm_str = f'{warm}ms' if warm < 1000 else f'{warm/1000:.2f}s'
              speedup = f'{cold/warm:.1f}x' if warm > 0 else '-'
              print(f'| {proj} | {cold_str} | {warm_str} | {speedup} |')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-real-world-report
          path: |
            bench-real-world.json
            bench-real-world-stderr.txt
          retention-days: 30

      - name: Enforce Benchmark Guard
        if: always() && steps.bench.outcome == 'failure'
        run: |
          echo "Real-world benchmark guard failed. See bench-real-world-stderr.txt for details." >&2
          exit 1
