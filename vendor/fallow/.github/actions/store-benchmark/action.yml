name: Store Benchmark
description: Store benchmark results on gh-pages via github-action-benchmark

inputs:
  name:
    description: 'Benchmark suite name'
    required: true
  tool:
    description: 'Benchmark tool type (cargo, customSmallerIsBetter, customBiggerIsBetter)'
    required: true
  output-file-path:
    description: 'Path to the benchmark output file'
    required: true
  data-dir:
    description: 'Directory under dev/ on gh-pages for storing data (e.g., bench, allocs)'
    required: true
  alert-threshold:
    description: 'Alert if performance changes by this percentage'
    default: '110%'
  github-token:
    description: 'GitHub token for pushing results and posting comments'
    required: true
  continue-on-error:
    description: 'Whether the step should continue on error (true/false)'
    default: 'false'

runs:
  using: composite
  steps:
    - uses: benchmark-action/github-action-benchmark@a7bc2366eda11037936ea57d811a43b3418d3073 # v1
      continue-on-error: ${{ inputs.continue-on-error == 'true' }}
      with:
        name: ${{ inputs.name }}
        tool: ${{ inputs.tool }}
        output-file-path: ${{ inputs.output-file-path }}
        github-token: ${{ inputs.github-token }}
        auto-push: ${{ github.event_name != 'pull_request' }}
        comment-on-alert: true
        comment-always: ${{ github.event_name == 'pull_request' }}
        alert-threshold: ${{ inputs.alert-threshold }}
        fail-on-alert: false
        max-items-in-chart: 100
        save-data-file: ${{ github.event_name != 'pull_request' }}
        gh-pages-branch: gh-pages
        benchmark-data-dir-path: dev/${{ inputs.data-dir }}
